name: Obedové menu do Slacku

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inštalácia závislostí
        run: pip install -r requirements.txt

      - name: Spustenie scrapera
        run: python menu_scraper.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CALORIENINJAS_API_KEY: ${{ secrets.CALORIENINJAS_API_KEY }}
